name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # TODO: Enable CGO when duckdb is added. Cross-compilation with CGO
          # requires platform-specific C toolchains (e.g. zig cc, xgo, or
          # Docker-based builders). For now pure Go builds work fine.
          CGO_ENABLED: "0"
        run: |
          BINARY="ifc-to-db-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${BINARY}" ./cmd/ifc-to-db

      - uses: actions/upload-artifact@v4
        with:
          name: ifc-to-db-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package and checksum
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            binary=$(find "$dir" -type f | head -1)
            if [[ "$name" == *windows* ]]; then
              (cd "$dir" && zip "../../release/${name}.zip" *)
            else
              chmod +x "$binary"
              tar -czf "release/${name}.tar.gz" -C "$dir" .
            fi
          done
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
